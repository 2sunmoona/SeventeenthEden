  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f7;font-family:"Noto Sans TC",sans-serif;color:#333;line-height:1.8}
h2{text-align:center;padding:24px;margin:0}
.layout{display:flex;gap:24px;width:min(1400px,95%);margin:0 auto 24px}
#network{flex:2;height:80vh;background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
#info{flex:1;padding:24px;background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);overflow:auto;max-height:80vh}
.cp-card{background:#fafafa;border-left:5px solid #000000;padding:14px;border-radius:10px;margin-bottom:16px}
#info blockquote{border-left:4px solid #ccc;padding-left:12px;color:#666}
#info code{background:#eee;padding:2px 5px;border-radius:4px}
#info img{max-width:100%}
@media(max-width:900px){.layout{flex-direction:column}#network{height:55vh}#info{max-height:none}}
</style>
</head>

<body>
  <h2>暮娜牌SVT沙拉碗食用方法</h2>

  <div class="layout">
    <div id="network"></div>

    <div id="info"></div>
  </div>

<script>


var defaultInfoHTML = `

</a><br>
<br>
<br>

update:2026.7.7</p>
`;

document.getElementById("info").innerHTML = defaultInfoHTML;
 
const rawNodes = [
  [1, "S.C", "95"],
  [2, "JH", "95"],
  [3, "Josh", "95"],

  [5, "HS", "96"],
  [6, "WW", "96"],
  [7, "WZ", "96"],

  [9, "MG", "97"],
  [10, "DK", "97"],

  [11, "SK", "doremi"],
  [12, "VN", "doremi"],
  [13, "DN", "doremi"]
];

var nodes = new vis.DataSet(
  rawNodes.map(([id, label, group]) => ({ id, label, group }))
);

const rawEdges = [
  [1,2],[1,3],[1,6],[1,7],[1,9],
  [2,3],[2,6],[2,10],
  [3,12],
  [5,7],[5,10],[5,11],[5,13],
  [6,7],
  [7,10],
  [9,10],[9,11],[9,13],
  [10,11],
];

var edges = new vis.DataSet(
  rawEdges.map(([from,to]) => ({ from, to }))
);

var infoData = {
  1: {
    cpList: [
      { cp: "95line", desc: "漢喆/秀喆，總之就是喜歡看濃眉大眼壯受" },
      { cp: "慶尚道", desc: "大哥們或鄉下土包子，回家種田的慶尚式純愛，無差" },
      { cp: "CxM", desc: "好大，巧克力配牛奶，無差但比較喜歡蘸牛奶吃" }
    ]
  },

  2: {
    cpList: [
      { cp: "95line", desc: "漢喆/尹洪，非常典型and非常完美的長髮美人攻，~~我也不知道了你們三個都0.5~~" },
      { cp: "漢碩", desc: "無差但通常狗在右邊，會跟年下一起幼稚的溫柔大葛格" },
      { cp: "JxW", desc: "太陰濕男鬼了，好愛好愛，無差" }
    ]
  },

  3: {
    cpList: [
      { cp: "95line", desc: "秀喆/尹洪，跟尹一樣美人攻" },
      { cp: "USA", desc: "2-1=0 american breakfast 美式純愛" }
    ]
  },

  5: {
    cpList: [
      { cp: "豪雨", desc: "男高中生純愛，~~屁孩~~" },
      { cp: "BSS", desc: "社畜們的辦公室戀愛，彼此的前任的前任的前任" },
      { cp: "主舞s", desc: "純燦純，不純愛關係中的純愛，夜店遇到的那種，~~aka炮友~~" }
    ]
  },

  6: {
    cpList: [
      { cp: "JxW", desc: "太陰濕男鬼了，好愛好愛" },
      { cp: "慶尚道", desc: "大哥們或鄉下土包子，回家種田的慶尚式純愛，無差" },
    ]
  },

  7: {
    cpList: [
      { cp: "慶尚道", desc: "大哥們或鄉下土包子，回家種田的慶尚式純愛，無差" },
      { cp: "豪雨", desc: "男高中生純愛，~~屁孩~~" },
      { cp: "投補", desc: "DKxWZ 不逆，年下小狗攻，純愛，甜的" },

    ]
  },

  9: {
    cpList: [
      { cp: "CxM", desc: "好大，巧克力配牛奶，無差但比較喜歡蘸牛奶吃" },
      { cp: "同年級三角", desc: "奎碩/寛奎，左右有意義，通常不純愛" },
      { cp: "放送高三角", desc: "奎寛燦無差" }

    ]
  },

  10: {
    cpList: [
      { cp: "漢碩", desc: "無差但通常狗在右邊，會跟年下一起幼稚的溫柔大葛格" },
      { cp: "投補", desc: "DKxWZ 不逆，年下小狗攻，純愛，甜的" },
      { cp: "同年級三角", desc: "奎碩/碩寛，左右有意義，通常不純愛" },
    ]
  },

  11: {
    cpList: [
      { cp: "同年級三角", desc: "碩寛/寛奎，左右有意義，通常不純愛" },
      { cp: "放送高三角", desc: "奎寛燦無差" },
    ]
  },

  12: {
    cpList: [
      { cp: "USA", desc: "2-1=0 american breakfast 美式純愛" }
    ]
  },

  13: {
    cpList: [
      { cp: "純燦純", desc: "不純愛關係中的純愛，夜店遇到的那種，~~aka炮友~~" },
      { cp: "放送高三角", desc: "奎寛燦無差" },
    ]
  }
};

var groups = {
  95:{ color: { background: "#AD5A5A", border: "#613030" } },
  96:{ color: { background: "#5CADAD", border: "#336666" } },
  97:{ color: { background: "#A5A552", border: "#616130" } },
  doremi:{ color: { background: "#8080C0", border: "#484891" } }
};

var container = document.getElementById("network");

var data = { nodes, edges };

var options = {
  groups,
  nodes: { chosen:false, fixed:false },
  edges: { smooth:false },
  physics: { enabled:true, stabilization:false },
  interaction: { dragNodes:true, dragView:true, zoomView:true, selectable:true }
};

var network = new vis.Network(container, data, options);
  

function resetView() {
  nodes.forEach(n => nodes.update({ id: n.id, opacity: 1 }));
  edges.forEach(e => edges.update({ id: e.id, opacity: 1, width: 1 }));
}

function focusNode(id) {
  const connected = new Set(network.getConnectedNodes(id).concat(id));

  nodes.forEach(n => {
    nodes.update({
      id: n.id,
      opacity: connected.has(n.id) ? 1 : 0.1
    });
  });

  edges.forEach(e => {
    const isRelated =
      connected.has(e.from) &&
      connected.has(e.to);

    edges.update({
      id: e.id,
      opacity: isRelated ? 1 : 0.05,
      width: isRelated ? 4 : 1
    });
  });
}

network.on("click", function (params) {

  if (params.nodes.length > 0) {

    var id = params.nodes[0];
    var node = nodes.get(id);
    var info = infoData[id];

    focusNode(id);

    if (info) {

      var html = "<h2>" + node.label + "</h2>";

      html += info.cpList.map(item => `
        <div class="cp-card"><h3>${item.cp}</h3>${DOMPurify.sanitize(marked.parse(item.desc))}</div>
      `).join("");

      document.getElementById("info").innerHTML = html;

    } else {
      document.getElementById("info").innerHTML =
        "<p>這個角色還沒有資料</p>";
    }

  } else {
    resetView();
    document.getElementById("info").innerHTML = defaultInfoHTML;
  }
});
</script>

</body>
</html>
